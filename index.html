<!DOCTYPE html>
<!-- CAIUCTUCUC v0.21.2 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CAIUCTUCUC</title>
<style>
  :root {
    --paper: #14120e;
    --ink: #d8cfb8;
    --dim: #7a715c;
    --accent: #9a4a32;
    --panel: #1d1a14;
  }
  [data-theme="high-contrast"] {
    --paper: #000000;
    --ink: #ffffff;
    --dim: #cccccc;
    --accent: #ff6a3d;
    --panel: #111111;
  }
  html, body { margin: 0; height: 100%; background: var(--paper); color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif; }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  header { display: flex; align-items: baseline; gap: 1rem; padding: .5rem 1rem; }
  header h1 { font-size: clamp(1rem, 2.5vw, 1.4rem); letter-spacing: .35em; margin: 0; font-weight: normal; }
  header .ver { color: var(--dim); font-size: .8rem; }
  header .spacer { flex: 1; }
  #splash { position: absolute; inset: 0; z-index: 40; display: grid; place-items: center;
    background: radial-gradient(ellipse at center, #2a2620 0%, #16130e 70%);
    cursor: pointer; transition: opacity .6s ease; }
  #splash img { max-width: min(92%, 60rem); max-height: 92%; box-shadow: 0 14px 50px rgba(0,0,0,.65);
    border-radius: 2px; animation: splashin 1.1s ease both; }
  #splash.gone { opacity: 0; pointer-events: none; }
  @keyframes splashin { from { opacity: 0; transform: translateY(10px) scale(.985); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { #splash img { animation: none; } #splash { transition: none; } }
  #hud-retired { display: inline-flex; align-items: baseline; gap: .9rem; padding: .28rem .9rem;
    border-top: 1px solid var(--dim); border-bottom: 1px solid var(--dim);
    box-shadow: 0 2px 0 -1px var(--dim), 0 -2px 0 -1px var(--dim);
    background: linear-gradient(#241f17, #1c1812); }
  #hud > span:not(:first-child)::before { content: '\2219'; color: var(--dim); margin-right: .9rem; }
  #hudHealth { color: #b8564a; letter-spacing: .06em; }
  #hudCoin { color: #c9b458; }
  .heat-0 { color: #7d8a6a; } .heat-1 { color: #b8a25a; } .heat-2 { color: #c08048; }
  .heat-3 { color: #b8564a; } .heat-4 { color: #d24a3a; font-weight: bold; }
  select { background: var(--panel); color: var(--ink); border: 1px solid var(--dim); font: inherit; padding: .2rem; }
  button { background: var(--panel); color: var(--ink); border: 1px solid var(--dim);
    font: inherit; padding: .25rem .7rem; cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #stage { flex: 1; display: grid; place-items: center; min-height: 0; overflow: hidden; }
  canvas { image-rendering: pixelated; background: #000; }
  #stage:fullscreen { background: var(--paper); }
  #menu { position: absolute; top: 3rem; right: 1rem; background: var(--panel);
    border: 1px solid var(--dim); padding: .8rem 1rem; display: none; min-width: 14rem; }
  #menu.open { display: block; }
  #menu h2 { font-size: .85rem; letter-spacing: .2em; margin: .2rem 0 .6rem; color: var(--dim); font-weight: normal; }
  #menu .row { margin: .45rem 0; display: flex; gap: .5rem; align-items: center; justify-content: space-between; }
  footer { padding: .3rem 1rem; color: var(--dim); font-size: .75rem; }
  a { color: var(--accent); }
  #hud { display: none; }  /* retired: the in-canvas band is the HUD now */
  #hudHeat[data-hot="1"] { color: var(--accent); }
  #toast { position: absolute; left: 50%; top: 3.2rem; transform: translateX(-50%);
    width: min(34rem, 90vw); background: var(--panel); border: 1px solid var(--dim);
    padding: .5rem .9rem; font-size: .9rem; opacity: 0; transition: opacity .25s; pointer-events: none; }
  #toast.show { opacity: 1; }
  #journal { position: absolute; left: 50%; top: 3.5rem; transform: translateX(-50%);
    width: min(34rem, 94vw); max-height: 74vh; overflow: auto; display: none;
    background: linear-gradient(180deg, #d8cdb0 0%, #cabf9f 100%); color: #2a2118;
    border: 2px solid #4a3c28; border-radius: 2px; padding: 0;
    box-shadow: 0 8px 30px rgba(0,0,0,.55); }
  #journal.open { display: block; }
  #journal .jhead { display: flex; align-items: baseline; justify-content: space-between;
    padding: .7rem 1rem .4rem; border-bottom: 1px solid #8a7a58; }
  #journal h2 { font-size: .85rem; letter-spacing: .3em; color: #5a3a2a; margin: 0; font-weight: normal; }
  #journal .jtrail { font-size: .72rem; color: #6a5a3a; font-style: italic; }
  #journal .jtabs { display: flex; gap: 0; padding: 0 .6rem; border-bottom: 1px solid #8a7a58;
    position: sticky; top: 0; background: #d0c5a6; z-index: 2; }
  #journal .jtab { flex: 1; text-align: center; padding: .45rem .3rem; font-size: .72rem;
    letter-spacing: .12em; color: #6a5a3a; cursor: pointer; border-bottom: 2px solid transparent; }
  #journal .jtab.active { color: #3a2a1a; border-bottom-color: #7a3a2a; font-weight: bold; }
  #journal .jbody { padding: .8rem 1rem 1.2rem; }
  #journal .thread-label { font-size: .68rem; letter-spacing: .22em; color: #7a5a3a;
    margin: .9rem 0 .35rem; text-transform: uppercase; }
  #journal .card { background: #e6ddc4; border: 1px solid #a89870; border-left: 3px solid #7a3a2a;
    padding: .5rem .6rem; margin: .35rem 0; box-shadow: 1px 1px 0 rgba(0,0,0,.1);
    transform: rotate(-.3deg); }
  #journal .card:nth-child(even) { transform: rotate(.4deg); }
  #journal .card b { color: #5a2a1a; }
  #journal .card p { margin: .2rem 0 0; font-size: .8rem; line-height: 1.35; }
  #journal .empty { font-style: italic; color: #6a5a3a; }
  #journal .kw { display: inline-block; background: #e6ddc4; border: 1px solid #8a7a58;
    padding: .1rem .5rem; margin: .15rem; font-size: .76rem; letter-spacing: .08em; color: #3a2a1a; }
  #journal .kw.fresh { border-color: #7a3a2a; box-shadow: 0 0 0 1px #7a3a2a inset; }
  #journal .suspect { border: 1px solid #a89870; background: #e6ddc4; padding: .5rem .6rem; margin: .4rem 0; }
  #journal .suspect b { color: #5a2a1a; }
  #journal .suspect .knows { font-size: .78rem; margin: .25rem 0 0; }
  #journal .suspect .unknown { font-size: .78rem; color: #8a7a58; font-style: italic; }
  #journal .stand { display: flex; justify-content: space-between; font-size: .8rem;
    padding: .2rem 0; border-bottom: 1px dotted #a89870; }
  #journal h3 { font-size: .72rem; letter-spacing: .2em; color: #7a5a3a; margin: .8rem 0 .3rem; font-weight: normal; }
  #panel { position: absolute; left: 50%; top: 4rem; transform: translateX(-50%);
    width: min(30rem, 92vw); max-height: 70vh; overflow: auto; background: var(--panel);
    border: 1px solid var(--dim); padding: 1rem 1.2rem; display: none; }
  #panel.open { display: block; }
  #panel h2 { font-size: .85rem; letter-spacing: .3em; color: var(--accent); margin: 0 0 .6rem; font-weight: normal; }
  #panel .row { display: flex; justify-content: space-between; align-items: baseline; gap: .6rem; margin: .3rem 0; }
  #panel .dim { color: var(--dim); font-size: .8rem; }
  #term { position: absolute; left: 50%; bottom: 3rem; transform: translateX(-50%);
    width: min(22rem, 80vw); background: #000; border: 1px solid var(--accent);
    padding: .5rem .7rem; display: none; font-family: 'Courier New', monospace; }
  #term.open { display: block; }
  #term input { width: 100%; background: #000; color: var(--accent); border: none;
    font: inherit; text-transform: uppercase; letter-spacing: .2em; }
  #term input:focus { outline: none; }
  @media (prefers-reduced-motion: reduce) { #toast { transition: none; } }
  #dialog { position: absolute; left: 50%; bottom: 3rem; transform: translateX(-50%);
    width: min(38rem, 92vw); background: var(--panel); border: 1px solid var(--dim);
    padding: .9rem 1.1rem; display: none; }
  #dialog.open { display: block; }
  #dialog h2 { margin: 0 0 .4rem; font-size: .9rem; letter-spacing: .25em; color: var(--accent); font-weight: normal; }
  #dialogText { margin: 0 0 .7rem; line-height: 1.45; min-height: 3.6em; }
  #dialogWords { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .6rem; }
  #dialogWords button { font-size: .8rem; letter-spacing: .1em; }
  #dialogAsk { display: flex; gap: .4rem; }
  #dialogAsk input { flex: 1; background: var(--paper); color: var(--ink);
    border: 1px solid var(--dim); font: inherit; padding: .25rem .5rem; text-transform: uppercase; }
  #dialogAsk input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #hint { position: absolute; left: 50%; bottom: 3rem; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--dim); color: var(--dim);
    padding: .2rem .8rem; font-size: .8rem; display: none; }
  #hint.show { display: block; }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>CAIUCTUCUC</h1>
    <span class="ver" id="version"></span>
    <button id="fullBtn" aria-label="Toggle fullscreen">Fullscreen</button>
    <button id="muteBtn" aria-pressed="false" aria-label="Mute audio">Sound: on</button>
    <button id="menuBtn" aria-expanded="false" aria-controls="menu">Menu</button>
  </header>
  <div id="menu" role="dialog" aria-label="Game menu">
    <h2>SETTINGS</h2>
    <div class="row"><span>Theme</span><button id="themeBtn">Night</button></div>
    <div class="row"><span>Scale</span><button id="scaleBtn">Fill the room</button></div>
    <div class="row"><span>Combat</span><select id="diffCombat"><option>storied</option><option selected>frontier</option><option>perilous</option></select></div>
    <div class="row"><span>Survival</span><select id="diffSurvival"><option>off</option><option selected>buffs</option><option>hard</option></select></div>
    <div class="row"><span>Hue and cry</span><select id="diffHuecry"><option>lenient</option><option selected>standard</option><option>sharp</option></select></div>
    <div class="row"><span>Save</span><button id="exportBtn">Export</button></div>
    <div class="row"><span>Load</span><button id="importBtn">Import</button></div>
    <div class="row"><span>Start over</span><button id="resetBtn">Reset game</button></div>
    <div class="row"><span>Feedback</span><a href="https://mbparks.com" target="_blank" rel="noopener">mbparks.com</a></div>
    <input type="file" id="importFile" accept=".json" hidden>
  </div>
  <div id="stage">
    <div id="splash" role="button" aria-label="Begin">
      <img src="assets/splash.png" alt="A hand-tinted postcard: the stone bridge in the Narrows of Wills Creek, Cumberland, Maryland">
    </div><canvas id="game" width="480" height="320" tabindex="0" aria-label="Game view"></canvas></div>
  <div id="panel" role="dialog" aria-label="Actions">
    <h2 id="panelTitle"></h2>
    <div id="panelBody"></div>
    <div style="margin-top:.6rem"><button id="panelClose">Close</button></div>
  </div>
  <div id="journal" role="dialog" aria-label="Case file"></div>
  <div id="term" role="dialog" aria-label="Terminal">
    <input id="termInput" placeholder="speak, friend" aria-label="Cheat code" maxlength="20" autocomplete="off">
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div id="hint">Press E to talk</div>
  <div id="dialog" role="dialog" aria-label="Conversation" aria-live="polite">
    <h2 id="dialogName"></h2>
    <p id="dialogText"></p>
    <div id="dialogWords"></div>
    <div id="dialogAsk">
      <input id="dialogInput" placeholder="type a word" aria-label="Ask a keyword" maxlength="16" autocomplete="off">
      <button id="dialogGo">Ask</button>
      <button id="dialogBye">Bye</button>
    </div>
  </div>
  <footer>Arrow keys or WASD to walk, E to interact, I for satchel, J for journal, Q to surrender when cornered. A supernatural mystery, Cumberland, Maryland, the 1850s.</footer>
</div>
<script>
  window.addEventListener('error', function (e) {
    if (!window.__CAIUCTUCUC_ERR) window.__CAIUCTUCUC_ERR = (e.message || 'unknown error') + (e.filename ? ' in ' + e.filename.split('/').pop() : '');
  }, true);
  setTimeout(function () {
    if (window.__CAIUCTUCUC_BOOTED) return;
    var stage = document.getElementById('stage');
    var box = document.createElement('div');
    box.style.cssText = 'max-width:34rem;padding:1.2rem 1.5rem;border:1px solid #7a715c;background:#1d1a14;line-height:1.5';
    var why;
    if (location.protocol === 'file:') {
      why = '<p style="letter-spacing:.2em;color:#9a4a32;margin:0 0 .6rem">THE GAME DID NOT START</p>'
        + '<p>It was opened straight from the disk (file://), and browsers refuse to run module scripts or load map data that way. No error is shown; the screen just stays dark. This one is on the browser, not on you.</p>'
        + '<p>Serve the folder with any static server and open it by address instead. From the repo folder:</p>'
        + '<p style="font-family:monospace;background:#000;padding:.5rem .7rem">python3 -m http.server 8000</p>'
        + '<p>Then visit <span style="font-family:monospace">http://localhost:8000</span></p>';
    } else {
      why = '<p style="letter-spacing:.2em;color:#9a4a32;margin:0 0 .6rem">THE GAME DID NOT START</p>'
        + '<p>The main script never ran.' + (window.__CAIUCTUCUC_ERR ? ' First error: <span style="font-family:monospace">' + window.__CAIUCTUCUC_ERR + '</span>' : ' No error was reported, which usually means the script file did not load; check the address and the browser console.') + '</p>';
    }
    box.innerHTML = why;
    stage.replaceChildren(box);
  }, 1500);
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
